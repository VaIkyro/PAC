<!DOCTYPE html>
<html>
<head>
  <title>Engine Performance Tool</title>
  <style>
    body {
      margin: 0;
      background: #f4f4f4;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .controls {
      margin: 20px;
    }

    .controls input[type="number"] {
      width: 120px;
      padding: 5px;
      margin-right: 20px;
    }

    .chart-container {
      position: relative;
    }

    .chart-container img {
      display: block;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .main-layout {
      display: flex;
      align-items: flex-start;  
      gap: 20px;
      padding: 10px;
    }

    .aircraft-selector {
      margin-bottom: 15px;
    }

    .aircraft-selector select {
      padding: 4px 8px;
      border-radius: 6px;
    }

    .aircraft-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .aircraft-label {
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }

    .hover-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    .hover-toggle input {
      margin: 0;
    }

    .cockpit-panel {
      margin-top: -20px;
      padding: 20px;
      width: 380px;
      background: #f7f9fc;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      font-family: Arial, sans-serif;
    }

    .clear-btn {
      position: relative;
      top: 18px;
      right: -350px;
      font-size: 12px;
      border: transparent;
      background: rgba(255, 255, 255, 0);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .clear-btn:hover {
      background: #e6e6e6;
    }

    .section-title {
      font-size: 13px;
      font-weight: bold;
      color: #666;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .input-group,
    .result-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .input-group input {
      width: 140px;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .result-group span:last-child {
      font-weight: bold;
      font-size: 16px;
    }

    .margin span:last-child {
      color: #0066cc;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 15px 0;
    }

    .chart-status {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      
      background: rgba(0, 0, 0, 0.65);
      color: white;
      
      padding: 6px 14px;
      border-radius: 20px;
      
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      
      pointer-events: none;
    }

  </style>
</head>
<body>

<div class="main-layout">
  <div class="controls">
    <div class="cockpit-panel">

      <button id="clearButton" class="clear-btn">✕</button>

      <div class="section-title">COCKPIT INPUTS</div>

      <div class="aircraft-selector">
        <div class="aircraft-row">
          <label class="aircraft-label">Aircraft:</label>

          <select id="aircraftSelect">
            <option value="A109S">A109S</option>
            <option value="A109SP">A109SP</option>
            <option value="A109E">A109E</option>
          </select>

          <label class="hover-toggle">
            <input type="checkbox" id="hoverMode" checked>
            <span>Hover</span>
          </label>
        </div>
      </div>

      <label style="font-size: 12px; color: #999; margin-bottom: 5px; display: block;">
        (Enter current conditions, all must be filled for lines to show)*
      </label>

      <div class="input-group">
        <label>Torque</label>
        <input type="number" min="50" max="124" id="torqueInput">
      </div>

      <div class="input-group">
        <label>Pressure Altitude (ft)</label>
        <input type="number" min="-1000" max="12000" id="altitudeInput">
      </div>

      <div class="input-group">
        <label>OAT (°C)</label>
        <input type="number" min="-40" max="50" id="oatInput">
      </div>

      <hr>

      <div class="section-title">MAXIMUM ALLOWABLE</div>

      <div class="result-group">
        <span>Max TOT</span>
        <span id="totDisplay">-- °C</span>
      </div>

      <div class="result-group">
        <span>Max N1</span>
        <span id="n1Display">-- %</span>
      </div>

      <hr>

      <div class="section-title">OBSERVED</div>
          <label style="font-size: 12px; color: #999; margin-bottom: 5px; display: block;">
          (Enter observed conditions, all must be filled for margins to calculate)*</label>

      <div class="input-group">
        <label>Observed TOT (°C)</label>
        <input type="number" id="observedTOT">
      </div>

      <div class="input-group">
        <label>Observed N1 (%)</label>
        <input type="number" id="observedN1">
      </div>

      <hr>

      <div class="section-title">MARGIN</div>

      <div class="result-group margin">
        <span>TOT Margin</span>
        <span id="totMargin">-- °C</span>
      </div>

      <div class="result-group margin">
        <span>N1 Margin</span>
        <span id="n1Margin">-- %</span>
      </div>
        <label style="font-size: 12px; color: #999; margin-bottom: 15px; display: block;">
        (This is an experimental application, if unsure please manually graph)*</label>
    </div>
  </div>

  <div class="chart-container">
    <img id="chartImage">
    <canvas id="overlay"></canvas>
    <div id="chartStatus" class="chart-status"></div>
  </div>
</div>

<script>
const aircraftSelect = document.getElementById("aircraftSelect");
const hoverModeCheckbox = document.getElementById("hoverMode");
const observedTOTInput = document.getElementById("observedTOT");
const observedN1Input = document.getElementById("observedN1");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");
const img = document.getElementById("chartImage");
const chartStatus = document.getElementById("chartStatus");

const torqueInput = document.getElementById("torqueInput");
const altInput = document.getElementById("altitudeInput");
const oatInput = document.getElementById("oatInput");
const clearButton = document.getElementById("clearButton");

const totDisplay = document.getElementById("totDisplay");
const n1Display = document.getElementById("n1Display");
const totMargin = document.getElementById("totMargin");
const n1Margin = document.getElementById("n1Margin");

function clampInput(input) {
  const min = parseFloat(input.min);
  const max = parseFloat(input.max);

  let value = parseFloat(input.value);

  if (isNaN(value)) return;

  if (!isNaN(min) && value < min) value = min;
  if (!isNaN(max) && value > max) value = max;

  input.value = value;
}

let currentAircraft = "A109S_Hover";

function updateAircraftMode() {
  const aircraft = aircraftSelect.value;
  const isHover = hoverModeCheckbox.checked;

  currentAircraft = aircraft + "_" + (isHover ? "Hover" : "Flight");

  const data = getAircraft();
  if (!data) {
    console.error("Aircraft data not found:", currentAircraft);
    return;
  }

  chartStatus.textContent = aircraft + " — " + (isHover ? "Hover" : "In Flight");

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    updateLines();
  };

  img.src = data.chartImage;

  // Handle cached images (very important!)
  if (img.complete) img.onload();
}

clearButton.addEventListener("click", function () {

  // Clear inputs
  torqueInput.value = "";
  altInput.value = "";
  oatInput.value = "";
  observedTOTInput.value = "";
  observedN1Input.value = "";

  // Clear display values
  totDisplay.innerText = "-- °C";
  n1Display.innerText = "-- %";
  totMargin.innerText = "-- °C";
  n1Margin.innerText = "-- %";
  totMargin.style.color = "";
  n1Margin.style.color = "";

  // Clear canvas lines
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});

function checkAllInputsEmpty() {
  if (
    torqueInput.value.trim() === "" &&
    altInput.value.trim() === "" &&
    oatInput.value.trim() === ""
  ) {
    clearButton.click();
  }
}

function getInputs() {
  return {
    torque: parseFloat(torqueInput.value),
    altitude: parseFloat(altInput.value),
    oat: parseFloat(oatInput.value),
    observedTOT: parseFloat(observedTOTInput.value),
    observedN1: parseFloat(observedN1Input.value)
  };
}

/* =====================================================
   AIRCRAFT SWITCHING
===================================================== */

function getAircraft() {
  const data = aircraftData[currentAircraft];
  if (!data) {
    console.error("Missing aircraft config:", currentAircraft);
  }
  return data;
}

/* -----------------------------
   CALIBRATION
------------------------------ */

function torqueToX(torque) {
  const data = getAircraft();
  console.log("INPUT TORQUE:", torque);
  return data.torqueSlope * torque + data.torqueOffset;
}

function pixelToTOT(xPixel) {
  const data = getAircraft();
  return data.totSlope * xPixel + data.totOffset;
}

function pixelToN1(xPixel) {
  const data = getAircraft();
  return data.n1Slope * xPixel + data.n1Offset;
}

/* -----------------------------
   ALTITUDE INTERPOLATION
------------------------------ */

function getInterpolatedLine(altitude) {

  const { altitudeLines: lines } = getAircraft();

  if (altitude <= lines[0].alt)
    return lines[0];

  if (altitude >= lines[lines.length - 1].alt)
    return lines[lines.length - 1];

  for (let i = 0; i < lines.length - 1; i++) {

    const lower = lines[i];
    const upper = lines[i + 1];

    if (altitude >= lower.alt && altitude <= upper.alt) {

      const ratio =
        (altitude - lower.alt) / (upper.alt - lower.alt);

      const m = lower.m + ratio * (upper.m - lower.m);
      const b = lower.b + ratio * (upper.b - lower.b);

      return { m, b };
    }
  }
}

function getInterpolatedOATLine(oat, lines) {

  if (oat >= lines[0].oat) return lines[0];
  if (oat <= lines[lines.length - 1].oat) return lines[lines.length - 1];

  for (let i = 0; i < lines.length - 1; i++) {

    const upper = lines[i];
    const lower = lines[i + 1];

    if (oat <= upper.oat && oat >= lower.oat) {

      const ratio = (upper.oat - oat) / (upper.oat - lower.oat);

      function interpolateSegments(index) {

        const u = upper.segments[index];
        const l = lower.segments[index];

        const result = {
          m: u.m + ratio * (l.m - u.m),
          b: u.b + ratio * (l.b - u.b)
        };

        if (u.yMax !== undefined)
          result.yMax = u.yMax + ratio * (l.yMax - u.yMax);

        if (u.yMin !== undefined)
          result.yMin = u.yMin + ratio * (l.yMin - u.yMin);

        return result;
      }

      return {
        segments:
          upper.segments.length === 1
            ? [interpolateSegments(0)]
            : [interpolateSegments(0), interpolateSegments(1)]
      };
    }
  }
}

/* -----------------------------
   CALCULATE INTERSECTION
------------------------------ */

function calculateIntersection(torque, altitude) {

  const line = getInterpolatedLine(altitude);

  const x = torqueToX(torque);
  const y = line.m * x + line.b;

  return { x, y };
}

  function selectSegment(line, y) {
    if (line.segments.length === 1) return line.segments[0];

    const bendY = line.segments[0].yMax;
    return (y <= bendY)
      ? line.segments[0]
      : line.segments[1];
  }

function calculateTOT(y, oat) {

  const { oatChart2 } = getAircraft();
  const line = getInterpolatedOATLine(oat, oatChart2);

  const segment = selectSegment(line, y);

  let xPixel = (y - segment.b) / segment.m;

  // Clamp at vertical wall
  const { totClampX } = getAircraft();
  if (xPixel > totClampX) xPixel = totClampX;

  return {
    xPixel,
    tot: pixelToTOT(xPixel)
  };
}

function calculateN1(y, oat) {

  const { oatChart3 } = getAircraft();
  const line = getInterpolatedOATLine(oat, oatChart3);

  const segment = selectSegment(line, y);

  let xPixel = (y - segment.b) / segment.m;

  // Clamp at vertical wall
  const { n1ClampX } = getAircraft();
  if (xPixel > n1ClampX) xPixel = n1ClampX;

  return {
    xPixel,
    n1: pixelToN1(xPixel)
  };
}

/* -----------------------------
   DRAW LINES
------------------------------ */

function invalidInputs({ torque, altitude, oat }) {
  return (
    torqueInput.value === "" ||
    altInput.value === "" ||
    oatInput.value === "" ||
    isNaN(torque) ||
    isNaN(altitude) ||
    isNaN(oat)
  );
}

function clearOutputs() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  totDisplay.innerText = "-- °C";
  n1Display.innerText = "-- %";
  totMargin.innerText = "-- °C";
  n1Margin.innerText = "-- %";

  totMargin.style.color = "";
  n1Margin.style.color = "";
}

function calculatePerformance({ torque, altitude, oat }) {
  const point = calculateIntersection(torque, altitude);

  const totResult = calculateTOT(point.y, oat);
  const n1Result = calculateN1(point.y, oat);

  return { point, totResult, n1Result };
}

function drawChart({ point, totResult, n1Result }) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.lineWidth = 2;

  // ----- Chart 1 -----
  ctx.strokeStyle = "#ff4d4d";

  // Vertical torque line
  ctx.beginPath();
  ctx.moveTo(point.x, 0);
  ctx.lineTo(point.x, canvas.height);
  ctx.stroke();

  // Horizontal line
  ctx.beginPath();
  ctx.moveTo(0, point.y);
  ctx.lineTo(canvas.width, point.y);
  ctx.stroke();

  // Intersection point
  ctx.beginPath();
  ctx.arc(point.x, point.y, 3, 0, Math.PI * 2);
  ctx.fill();

  // ----- TOT -----
  ctx.strokeStyle = "#ff4d4d";

  ctx.beginPath();
  ctx.moveTo(totResult.xPixel, 0);
  ctx.lineTo(totResult.xPixel, canvas.height);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(totResult.xPixel, point.y, 3, 0, Math.PI * 2);
  ctx.fill();

  // ----- N1 -----
  ctx.strokeStyle = "#ff4d4d";

  ctx.beginPath();
  ctx.moveTo(n1Result.xPixel, 0);
  ctx.lineTo(n1Result.xPixel, canvas.height);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(n1Result.xPixel, point.y, 3, 0, Math.PI * 2);
  ctx.fill();
}

function updateUI({ totResult, n1Result, observedTOT, observedN1 }) {

  // Display values
  totDisplay.innerText = totResult.tot.toFixed(0) + " °C";
  n1Display.innerText = n1Result.n1.toFixed(1) + " %";

  // TOT Margin
  if (!isNaN(observedTOT)) {
    const marginTOT = totResult.tot - observedTOT;
    totMargin.innerText = marginTOT.toFixed(0) + " °C";
    totMargin.style.color = marginTOT < 0 ? "red" : "green";
  } else {
    totMargin.innerText = "-- °C";
    totMargin.style.color = "";
  }

  // N1 Margin
  if (!isNaN(observedN1)) {
    const marginN1 = n1Result.n1 - observedN1;
    n1Margin.innerText = marginN1.toFixed(1) + " %";
    n1Margin.style.color = marginN1 < 0 ? "red" : "green";
  } else {
    n1Margin.innerText = "-- %";
    n1Margin.style.color = "";
  }
}

function updateLines() {
  const inputs = getInputs();

  if (invalidInputs(inputs)) {
    clearOutputs();
    return;
  }

  const results = calculatePerformance(inputs);

  drawChart(results);

  updateUI({
    ...results,
    ...inputs
  });
}

/* -----------------------------

------------------------------ */

img.onload = () => {
  canvas.width = img.width;
  canvas.height = img.height;

  // Force a fresh draw AFTER image is ready
  setTimeout(() => {
    updateLines();
  }, 0);
};

  clampInput(torqueInput);

});

});

observedTOTInput.addEventListener("input", updateLines);
